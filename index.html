<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Gestor Sustentável - Agrinho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header>
            <h1>O Gestor Sustentável</h1>
            <p class="subtitle">Desafio de Storytelling Interativo — Agrinho</p>
        </header>

        <div class="status-panel">
            <div class="stat-box">
                <div class="stat-label">💰 Lucro</div>
                <div class="progress-container">
                    <div id="lucro-bar" class="progress-bar fill-lucro"></div>
                </div>
                <div id="lucro-val" class="stat-value">50%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">🌱 Preservação</div>
                <div class="progress-container">
                    <div id="preservacao-bar" class="progress-bar fill-ambient"></div>
                </div>
                <div id="preservacao-val" class="stat-value">50%</div>
            </div>
        </div>

        <main class="game-body">
            <p id="scenario-text" class="scenario-text"></p>
            
            <div id="feedback-box" class="feedback-box hidden">
                <p id="feedback-text"></p>
            </div>
        </main>

        <div id="button-group" class="button-group"></div>

        <footer>
            <p>Projeto focado em Agricultura Sustentável e Práticas do Campo</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
