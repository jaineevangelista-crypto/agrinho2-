<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Gestor Sustentável - Jogo de Decisão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>O Gestor Sustentável</h1>
            <p class="subtitle">Equilibre suas finanças e o meio ambiente</p>
        </header>

        <div class="status-panel">
            <div class="stat-box">
                <span>💰 Lucro:</span>
                <div class="progress-bar">
                    <div id="lucro-bar" class="progress fill-lucro" style="width: 50%;"></div>
                </div>
                <span id="lucro-val">50%</span>
            </div>
            <div class="stat-box">
                <span>🌱 Preservação:</span>
                <div class="progress-bar">
                    <div id="preservacao-bar" class="progress fill-ambient" style="width: 50%;"></div>
                </div>
                <span id="preservacao-val">50%</span>
            </div>
        </div>

        <main class="game-body">
            <div id="scenario-text" class="scenario-text">
                Carregando o primeiro desafio...
            </div>

            <div id="feedback-text" class="feedback-text hidden"></div>

            <div id="choice-buttons" class="choice-buttons">
                </div>
        </main>

        <footer>
            <p>Projeto desenvolvido para o Programa Agrinho</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
